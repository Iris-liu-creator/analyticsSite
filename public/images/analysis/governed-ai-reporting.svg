      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="nodeC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
