<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Building Governed AI Reporting People Can Really Trust</title>
  <desc id="desc">A simplified governed AI reporting structure with a data governance layer above the reporting pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="governance" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="pillMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <g transform="translate(82 76)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#071a3d">
      Building Governed AI Reporting
    </text>
    <text x="0" y="66" dominant-baseline="hanging" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#071a3d">
      People Can Really Trust
    </text>
  </g>

  <g transform="translate(82 270)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1036" height="172" rx="32" fill="url(#governance)" stroke="#bfe9ee" stroke-width="2"/>
    <text x="518" y="53" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#071a3d">
      Data Governance
    </text>
    <text x="518" y="113" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">
      Ownership | Lineage | Quality | Security | Compliance | Auditability
    </text>
  </g>

  <g transform="translate(82 485)" filter="url(#softShadow)">
    <rect x="0" y="0" width="158" height="78" rx="24" fill="url(#pillBlue)" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="219.5" y="0" width="158" height="78" rx="24" fill="url(#pillMint)" stroke="#99f6e4" stroke-width="2"/>
    <rect x="439" y="0" width="158" height="78" rx="24" fill="#f0fdfa" stroke="#99f6e4" stroke-width="2"/>
    <rect x="658.5" y="0" width="158" height="78" rx="24" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="878" y="0" width="158" height="78" rx="24" fill="url(#pillBlue)" stroke="#bfdbfe" stroke-width="2"/>

    <g font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#071a3d" text-anchor="middle">
      <text x="79" y="47">Sources</text>
      <text x="298.5" y="47">ETL</text>
      <text x="518" y="47">Curated</text>
      <text x="737.5" y="47">Semantic</text>
      <text x="957" y="47">AI + BI</text>
    </g>
  </g>
</svg>
